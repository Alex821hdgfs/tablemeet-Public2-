{% extends 'base.html' %}
{% block title %}Вход{% endblock %}

{% block content %}
<div class="form-page">
    <form method="POST" class="styled-form">
        {{ form.hidden_tag() }}
        <h2>Вход</h2>

        <label>{{ form.email.label }}</label>
        {{ form.email() }}

        <label>{{ form.password.label }}</label>
        {{ form.password() }}

        {{ form.submit(class="btn full-btn") }}
    </form>
</div>
{% endblock %}
